<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正弦波ジェネレーター</title>
<style>
    body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; text-align: center; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
    
    .oscillator { border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left; background: #fafafa; }
    .osc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .osc-header h3 { margin: 0; color: #0056b3; }
    
    .control-group { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    input[type="number"] { width: 80px; padding: 5px; font-size: 16px; text-align: right; border: 1px solid #ccc; border-radius: 4px; }
    input[type="range"] { flex-grow: 1; margin: 0 15px; }
    .value-display { font-weight: bold; width: 50px; text-align: right; }
    
    .btn-play { background-color: #28a745; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; box-sizing: border-box; }
    .btn-play.playing { background-color: #dc3545; }
    
    .btn-add { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
    .btn-add:hover { background-color: #0056b3; }
    
    .btn-remove { background-color: #6c757d; color: white; border: none; padding: 5px 10px; font-size: 14px; border-radius: 4px; cursor: pointer; }
    .btn-remove:hover { background-color: #5a6268; }
</style>
</head>
<body>

<div class="container">
    <h1>正弦波ジェネレーター</h1>
    
    <button id="addBtn" class="btn-add" onclick="addOscillator()">＋ 音を追加</button>

    <div id="oscillators-container"></div>

    <button id="playBtn" class="btn-play">▶ 再生する</button>
</div>

<script>
    let audioCtx;
    let activeNodes = {}; // { id: { osc, gain } } という形で管理
    let isPlaying = false;
    let nextId = 1;

    // スライダーの数値を表示更新＆音量反映する関数
    function updateVol(id) {
        const volVal = document.getElementById('v-' + id).value;
        document.getElementById('vd-' + id).innerText = volVal;
        if (isPlaying && activeNodes[id]) {
            activeNodes[id].gain.gain.value = volVal / 100;
        }
    }

    // 周波数入力ボックスの値を即座に反映する関数
    function updateFreq(id) {
        const freqVal = document.getElementById('f-' + id).value;
        if (isPlaying && activeNodes[id]) {
            activeNodes[id].osc.frequency.value = parseFloat(freqVal);
        }
    }

    // 新しいオシレーター（音）のUIを追加する関数
    function addOscillator() {
        const id = nextId++;
        const container = document.getElementById('oscillators-container');
        
        const div = document.createElement('div');
        div.className = 'oscillator';
        div.id = `osc-${id}`;
        
        // 周波数の初期値は追加されるたびに少し変える（例: 400, 600, 800...）
        const defaultFreq = 200 + (id * 200);

        div.innerHTML = `
            <div class="osc-header">
                <h3>音 ${id}</h3>
                <button class="btn-remove" onclick="removeOscillator(${id})">削除</button>
            </div>
            <div class="control-group">
                <label>周波数 (Hz): </label>
                <input type="number" id="f-${id}" value="${defaultFreq}" step="1" oninput="updateFreq(${id})">
            </div>
            <div class="control-group">
                <label>音量 (%): </label>
                <input type="range" id="v-${id}" min="0" max="100" value="100" oninput="updateVol(${id})">
                <span class="value-display" id="vd-${id}">100</span>
            </div>
        `;
        container.appendChild(div);

        // 再生中に追加された場合、即座に音を鳴らし始める
        if (isPlaying) {
            startSingleOscillator(id);
        }
    }

    // オシレーターを削除する関数
    function removeOscillator(id) {
        // 再生中の場合は音を止める
        if (isPlaying && activeNodes[id]) {
            activeNodes[id].osc.stop();
            activeNodes[id].osc.disconnect();
            activeNodes[id].gain.disconnect();
            delete activeNodes[id];
        }
        // HTML要素を削除
        const el = document.getElementById(`osc-${id}`);
        if (el) el.remove();
    }

    // 特定のIDのオシレーターだけを起動する関数
    function startSingleOscillator(id, startTime = 0) {
        if (!audioCtx) return;
        
        const freqInput = document.getElementById(`f-${id}`);
        const volInput = document.getElementById(`v-${id}`);
        
        if (!freqInput || !volInput) return; // 削除されている場合はスキップ

        const freq = parseFloat(freqInput.value);
        const vol = parseFloat(volInput.value) / 100;

        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();

        osc.type = 'sine'; // サイン波
        osc.frequency.value = freq;
        gainNode.gain.value = vol;

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (startTime === 0) {
            osc.start(); // 即座にスタート
        } else {
            osc.start(startTime); // 指定時刻にスタート（和音を綺麗に揃えるため）
        }

        // 管理用オブジェクトに保存
        activeNodes[id] = { osc: osc, gain: gainNode };
    }

    // 再生・停止ボタンの処理
    document.getElementById('playBtn').addEventListener('click', function() {
        if (!isPlaying) {
            // AudioContextの初期化
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            let startTime = audioCtx.currentTime + 0.1; // 0.1秒後に同時にスタート

            // 現在画面に存在するすべてのオシレーターを取得して再生
            const oscDivs = document.querySelectorAll('.oscillator');
            oscDivs.forEach(div => {
                const id = parseInt(div.id.replace('osc-', ''));
                startSingleOscillator(id, startTime);
            });

            this.innerText = "■ 停止する";
            this.classList.add("playing");
            isPlaying = true;
        } else {
            // 全ての音を停止
            for (let id in activeNodes) {
                activeNodes[id].osc.stop();
                activeNodes[id].osc.disconnect();
                activeNodes[id].gain.disconnect();
            }
            activeNodes = {}; // 管理オブジェクトを空にする
            
            this.innerText = "▶ 再生する";
            this.classList.remove("playing");
            isPlaying = false;
        }
    });

    // ページ読み込み時に最初の1つの音を追加しておく
    window.onload = () => {
        addOscillator();
    };
</script>
</body>
</html>
